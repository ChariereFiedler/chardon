name: Release

on:
  push:
    tags: ["v*"]

# Least privilege by default; the release job elevates only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # sign the provenance attestation
      attestations: write # store the attestation
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      # Full check set: a tag that fails any gate does not become a release.
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - name: dist is in sync with source
        run: git diff --exit-code -- dist
      - run: npm run validate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '/^## \[/ { p = index($0, "[" ver "]") > 0 } p' \
            CHANGELOG.md > release-notes.md
          # A tag without a matching changelog section is a release mistake.
          test -s release-notes.md
      # Signed provenance for the precompiled bundles consumers actually run.
      - name: Attest build provenance of dist/
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/*.mjs
      - name: Create the GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
