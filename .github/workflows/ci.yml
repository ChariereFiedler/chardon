name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only reads the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      # Guard the runtime supply chain (dev-only advisories tracked via Dependabot).
      - run: npm audit --omit=dev --audit-level=high
      # The committed precompiled bundles must match the source.
      - run: npm run build
      - name: dist is in sync with source
        run: git diff --exit-code -- dist
      # Plugin manifests and the doc claims that can be checked mechanically.
      - run: npm run validate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Reports the v8 coverage summary in the job log (no external upload).
      - run: npm run coverage

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Guards against tests that execute the code without asserting on it.
      - run: npm run mutation

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the analysis results
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: github/codeql-action/init@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      # Defence in depth alongside app-level redaction: scan history for leaked secrets.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required on pull_request events (the action fetches PR commits via
          # the API); on push it scans the checked-out history directly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
